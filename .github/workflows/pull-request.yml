name: skiko-winui CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/pull-request.yml'
      - '.github/workflows/publish-skiko-winui.yml'
      - 'dependencies.toml'
      - 'gradle/**'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'skiko/build.gradle.kts'
      - 'skiko/buildSrc/**'
      - 'skiko/skiko-winui/**'
      - 'samples/SkiaWinUISample/**'
      - 'samples/SkiaWinUIMingwSmoke/**'
      - 'samples/SkiaMultiplatformSample/**'

permissions:
  contents: read

jobs:
  winui:
    name: skiko-winui Windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        name: Check out code

      - uses: actions/setup-java@v4
        name: Setup JDK 25
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Windows SDK 10.0.26100.0
        shell: pwsh
        run: |
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\References\10.0.26100.0"
          if (Test-Path $sdkPath) {
            Write-Host "Windows SDK 10.0.26100.0 already installed at $sdkPath"
          } else {
            winget install --id Microsoft.WindowsSDK.10.0.26100 `
              --silent `
              --accept-source-agreements `
              --accept-package-agreements
            if ($LASTEXITCODE -ne 0) {
              Write-Host "winget exited with code $LASTEXITCODE (may indicate already installed)"
            }
          }

      - uses: microsoft/setup-msbuild@v2
        name: Setup MSBuild

      - uses: ilammy/msvc-dev-cmd@v1
        name: Setup MSVC

      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio with MSVC x64 tools was not found."
          }
          "SKIKO_VSBT_PATH=$vsPath" >> $env:GITHUB_ENV

      - name: Configure NuGet cache path
        shell: pwsh
        run: |
          "NUGET_PACKAGES=${{ runner.temp }}\nuget-packages" >> $env:GITHUB_ENV

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}\nuget-packages
            ~\.gradle\caches\kotlin-winrt\nuget
          key: nuget-${{ runner.os }}-Microsoft.WindowsAppSDK-2.1.3
          restore-keys: nuget-${{ runner.os }}-

      - uses: gradle/actions/setup-gradle@v4
        name: Setup Gradle
        with:
          gradle-version: '9.4.0'

      - name: Download Skia Windows dependency
        working-directory: skiko
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p . unzipSkiaReleaseWindowsX64 --no-daemon --stacktrace --no-configuration-cache --max-workers=1 && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Run skiko-winui checks
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p . --no-daemon --stacktrace --no-configuration-cache --max-workers=1 \
              -Dorg.gradle.parallel=false \
              -Pskiko.winui.enabled=true \
              -Pskiko.winui.jvmTarget=25 \
              -Pskiko.winui.jvmToolchain=25 \
              -Pskiko.winui.mingw.enabled=true \
              -Pskiko.native.windows.enabled=true \
              -Pskiko.winui.skipSamples=true \
              :skiko-winui:checkWinuiAwtFreeBoundary \
              :skiko-winui:winuiMingwTest && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done
