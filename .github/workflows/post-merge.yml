name: Post-Merge CI

on:
  workflow_dispatch: # Disabled for the skiko-winui branch; use Publish Skiko WinUI instead.
  push: # Trigger on pushes to master and release branches
    branches-ignore:
      - '**'

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  disabled:
    name: Disabled
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Original Skiko post-merge CI is disabled. Use publish-skiko-winui.yml for skiko-winui snapshot publishing."
