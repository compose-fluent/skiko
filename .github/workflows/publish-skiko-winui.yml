name: Publish Skiko WinUI

on:
  push:
    branches:
      - winui_dev
    paths:
      - '.github/workflows/publish-skiko-winui.yml'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'dependencies.toml'
      - 'skiko/gradle.properties'
      - 'skiko/skiko-winui/**'
      - 'skiko/src/commonMain/cpp/**'
      - 'skiko/src/jvmMain/cpp/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skiko-winui:
    name: Publish skiko-winui to Maven
    runs-on: windows-2022

    steps:
      - name: Checkout Skiko
        uses: actions/checkout@v4
        with:
          path: compose-fluent-skiko

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Windows SDK 10.0.26100.0
        shell: pwsh
        run: |
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\References\10.0.26100.0"
          if (Test-Path $sdkPath) {
            Write-Host "Windows SDK 10.0.26100.0 already installed at $sdkPath"
          } else {
            winget install --id Microsoft.WindowsSDK.10.0.26100 `
              --silent `
              --accept-source-agreements `
              --accept-package-agreements
            if ($LASTEXITCODE -ne 0) {
              Write-Host "winget exited with code $LASTEXITCODE (may indicate already installed)"
            }
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio with MSVC x64 tools was not found."
          }
          "SKIKO_VSBT_PATH=$vsPath" >> $env:GITHUB_ENV

      - name: Configure NuGet cache path
        shell: pwsh
        run: |
          "NUGET_PACKAGES=${{ runner.temp }}\nuget-packages" >> $env:GITHUB_ENV

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}\nuget-packages
            ~\.gradle\caches\kotlin-winrt\nuget
          key: nuget-${{ runner.os }}-Microsoft.WindowsAppSDK-1.8.260416003
          restore-keys: nuget-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - name: Download Skia Windows dependency
        working-directory: compose-fluent-skiko/skiko
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p . unzipSkiaReleaseWindowsX64 --no-daemon --stacktrace --no-configuration-cache --max-workers=1 && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Verify skiko-winui publish locally
        working-directory: compose-fluent-skiko
        shell: bash
        run: |
          for attempt in 1 2 3; do
            gradle -p . --no-daemon --stacktrace --no-configuration-cache --max-workers=1 \
              -Dorg.gradle.parallel=false \
              -Pskiko.winui.jvmTarget=25 \
              -Pskiko.winui.jvmToolchain=25 \
              -Pskiko.winui.mingw.enabled=false \
              :skiko-winui:publishSkikoWinuiToMavenLocal && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Publish skiko-winui
        working-directory: compose-fluent-skiko
        shell: bash
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_KEY_ARMOR }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_KEY_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            gradle -p . --no-daemon --stacktrace --no-configuration-cache --max-workers=1 \
              -Dorg.gradle.parallel=false \
              -Pskiko.winui.jvmTarget=25 \
              -Pskiko.winui.jvmToolchain=25 \
              -Pskiko.winui.mingw.enabled=false \
              :skiko-winui:publishSkikoWinuiToMavenCentral && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done
